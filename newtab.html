<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dwar Sarthi</title>
  <link rel="stylesheet" href="newtab.css" />
</head>
<body>

  <!-- ── Top bar ──────────────────────────────────────────────────────── -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="greeting" id="greeting"></span>
    </div>
    <div class="topbar-center">
      <form class="search-form" id="search-form">
        <svg class="search-icon" viewBox="0 0 20 20" fill="none">
          <circle cx="8.5" cy="8.5" r="5.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M13 13l3.5 3.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <input type="text" id="search-input" placeholder="Search…" autocomplete="off" spellcheck="false" />
      </form>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" id="theme-toggle" title="Toggle theme" aria-label="Toggle theme">
        <svg id="theme-icon-sun" viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="4" stroke="currentColor" stroke-width="1.6"/>
          <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M14.36 5.64l1.42-1.42M4.22 15.78l1.42-1.42" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <svg id="theme-icon-moon" viewBox="0 0 20 20" fill="none" style="display:none">
          <path d="M17 12.5A7 7 0 1 1 7.5 3a5.5 5.5 0 0 0 9.5 9.5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="icon-btn" id="sync-btn" title="Sync now" aria-label="Sync now">
        <svg viewBox="0 0 20 20" fill="none">
          <path d="M4 4.5A6.5 6.5 0 0 1 16.5 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M16 15.5A6.5 6.5 0 0 1 3.5 10" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <path d="M4 2v3h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
          <path d="M16 18v-3h-3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </button>
      <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Open settings">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.6"/>
          <path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.22 4.22l1.06 1.06M14.72 14.72l1.06 1.06M4.22 15.78l1.06-1.06M14.72 5.28l1.06-1.06" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- ── Folder tabs ───────────────────────────────────────────────────── -->
  <nav class="folder-nav" id="folder-nav" role="tablist" aria-label="Dial folders"></nav>

  <!-- ── Sync status banner ───────────────────────────────────────────── -->
  <div class="sync-status" id="sync-status" role="status" aria-live="polite"></div>

  <!-- ── Main dial grid ───────────────────────────────────────────────── -->
  <main class="grid-wrap">
    <div class="dial-grid" id="dial-grid"></div>
  </main>

  <!-- ── Add dial FAB ─────────────────────────────────────────────────── -->
  <button class="fab" id="add-btn" title="Add dial" aria-label="Add new dial">
    <svg viewBox="0 0 20 20" fill="none">
      <path d="M10 4v12M4 10h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
  </button>

  <!-- ── Add / Edit dial modal ────────────────────────────────────────── -->
  <div class="modal-backdrop" id="dial-modal" hidden role="dialog" aria-modal="true" aria-labelledby="modal-title">
    <div class="modal">
      <h2 id="modal-title">Add dial</h2>
      <label>Title
        <input type="text" id="modal-title-input" placeholder="YouTube" />
      </label>
      <label>URL
        <input type="url" id="modal-url-input" placeholder="https://youtube.com" />
      </label>
      <label>Folder
        <select id="modal-folder-input"></select>
      </label>
      <div class="modal-actions">
        <button class="btn-ghost" id="modal-cancel">Cancel</button>
        <button class="btn-primary" id="modal-delete" style="display:none;color:var(--danger)">Delete</button>
        <button class="btn-primary" id="modal-save">Save</button>
      </div>
    </div>
  </div>

  <script type="module" src="src/newtab.js"></script>
</body>
</html>
